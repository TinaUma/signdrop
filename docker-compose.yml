services:
  backend:
    build: ./backend
    environment:
      - DATA_DIR=/data
    volumes:
      - data:/data
    # No host port mapping: the unauthenticated API is reached only by the
    # frontend nginx proxy over the internal network, never exposed to the LAN.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  data:
