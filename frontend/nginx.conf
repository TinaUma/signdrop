server {
    listen 8080;

    # Docker internal DNS — resolves service names dynamically at request time,
    # not at nginx startup (prevents "host not found in upstream" on container start).
    resolver 127.0.0.11 valid=30s;

    # Security response headers (apply to the served SPA via location /).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Serve .mjs files with correct MIME type so browsers accept them as ES modules.
    # types {} clears inherited mime table; default_type sets the single Content-Type.
    # Cache-Control: no-cache forces revalidation so stale browser cache doesn't bite.
    location ~* \.mjs$ {
        root /usr/share/nginx/html;
        types { }
        default_type application/javascript;
        add_header Cache-Control "no-cache";
        # add_header in a location drops inherited server-level headers, so the
        # security headers must be repeated here (nosniff matters for modules).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        try_files $uri =404;
    }

    # No trailing slash: preserves /api/ prefix so backend router at /api/... matches.
    # $backend_url variable forces dynamic DNS resolution (required when resolver is set).
    location /api/ {
        client_max_body_size 50m;
        set $backend_url http://backend:8000;
        proxy_pass $backend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
