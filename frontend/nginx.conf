server {
    listen 80;

    # Serve .mjs files with correct MIME type so browsers accept them as ES modules.
    # types {} clears inherited mime table; default_type sets the single Content-Type.
    # Cache-Control: no-cache forces revalidation so stale browser cache doesn't bite.
    location ~* \.mjs$ {
        root /usr/share/nginx/html;
        types { }
        default_type application/javascript;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # No trailing slash: preserves /api/ prefix so backend router at /api/... matches
    location /api/ {
        client_max_body_size 50m;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
