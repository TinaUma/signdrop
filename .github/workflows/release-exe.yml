name: Release (native .exe)

# Build a standalone Windows .exe (Tauri app + embedded FastAPI sidecar) on every
# push to main and publish it as a prerelease. Stable releases stay on release.yml
# (tag-triggered), so this workflow never runs on tags.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build FastAPI sidecar (PyInstaller)
        working-directory: backend
        run: |
          pip install -r requirements.txt pyinstaller
          pyinstaller api_server.spec --distpath dist --noconfirm

      - name: Place sidecar with target triple
        shell: pwsh
        run: |
          $triple = ((rustc -Vv) -split "`n" | Select-String '^host:').ToString().Split(' ')[1]
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item backend/dist/api-server.exe "src-tauri/binaries/api-server-$triple.exe"

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Generate app icons
        shell: pwsh
        run: |
          pip install pillow
          python -c "from PIL import Image; Image.new('RGBA',(1024,1024),(37,99,235,255)).save('app-icon.png')"
          npx --yes @tauri-apps/cli@^2 icon app-icon.png

      - name: Build Tauri app
        env:
          # The webview can't use relative /api; point the SPA at the sidecar.
          VITE_API_BASE: http://localhost:8000
        run: npx --yes @tauri-apps/cli@^2 build

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.sha }}
          name: Nightly ${{ github.sha }}
          prerelease: true
          fail_on_unmatched_files: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
