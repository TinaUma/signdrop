name: Release

# A merged PR (push to main) auto-tags v<version> (from package.json) when the
# version was bumped, then builds a full release: Windows .exe/.msi + GHCR
# images, published on that tag. Manual `v*` tags trigger the same build.
on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      do_release: ${{ steps.v.outputs.do_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version / tag
        id: v
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "do_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION="$(node -p "require('./frontend/package.json').version")"
          TAG="v$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists — version not bumped, skipping release."
            echo "do_release=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "do_release=true" >> "$GITHUB_OUTPUT"
          fi

  # Full Windows release (native app + embedded FastAPI sidecar), published on the tag.
  build-tauri:
    needs: prepare
    if: needs.prepare.outputs.do_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # node 24 / npm 11 — see ci.yml note; node 20 fails `npm ci`.
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build FastAPI sidecar (PyInstaller)
        working-directory: backend
        run: |
          pip install -r requirements.txt pyinstaller
          pyinstaller api_server.spec --distpath dist --noconfirm

      - name: Place sidecar with target triple
        shell: pwsh
        run: |
          $triple = ((rustc -Vv) -split "`n" | Select-String '^host:').ToString().Split(' ')[1]
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item backend/dist/api-server.exe "src-tauri/binaries/api-server-$triple.exe"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      # App icons are committed under src-tauri/icons/ (master: app-icon.png),
      # so there is no icon-generation step here — tauri-action uses them as-is.

      - name: Build Tauri app & publish release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No VITE_API_BASE: the webview discovers the sidecar's dynamic port at
          # runtime via the api_port Tauri command (src-tauri/src/lib.rs).
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: SignDrop ${{ needs.prepare.outputs.tag }}
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: false
          prerelease: false

      - name: Collect artifacts into release/
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Get-ChildItem -Recurse src-tauri/target/release/bundle -Include *.exe,*.msi |
            Copy-Item -Destination release -Force
          Get-ChildItem release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signdrop-windows
          path: release/

  # Publish backend + frontend images to GHCR on the same tag.
  build-docker:
    needs: prepare
    if: needs.prepare.outputs.do_release == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: meta
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/signdrop-backend:${{ needs.prepare.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/signdrop-backend:latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/signdrop-frontend:${{ needs.prepare.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/signdrop-frontend:latest
