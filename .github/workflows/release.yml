name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  # Stable Windows .exe/.msi release (native app + embedded FastAPI sidecar).
  build-tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build FastAPI sidecar (PyInstaller)
        working-directory: backend
        run: |
          pip install -r requirements.txt pyinstaller
          pyinstaller api_server.spec --distpath dist --noconfirm

      - name: Place sidecar with target triple
        shell: pwsh
        run: |
          $triple = ((rustc -Vv) -split "`n" | Select-String '^host:').ToString().Split(' ')[1]
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item backend/dist/api-server.exe "src-tauri/binaries/api-server-$triple.exe"

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Generate app icons
        shell: pwsh
        run: |
          pip install pillow
          python -c "from PIL import Image; Image.new('RGBA',(1024,1024),(37,99,235,255)).save('app-icon.png')"
          npx --yes @tauri-apps/cli@^2 icon app-icon.png

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_BASE: http://localhost:8000
        with:
          tagName: ${{ github.ref_name }}
          releaseName: PDF Signer ${{ github.ref_name }}
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false

      - name: Collect artifacts into release/
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Get-ChildItem -Recurse src-tauri/target/release/bundle -Include *.exe,*.msi |
            Copy-Item -Destination release -Force
          Get-ChildItem release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdf-signer-windows
          path: release/

  # Publish backend + frontend images to GHCR.
  build-docker:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: meta
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/pdf-signer-backend:${{ github.ref_name }}
            ghcr.io/${{ steps.meta.outputs.owner }}/pdf-signer-backend:latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/pdf-signer-frontend:${{ github.ref_name }}
            ghcr.io/${{ steps.meta.outputs.owner }}/pdf-signer-frontend:latest
