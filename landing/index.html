  /* ---- enclosed glowing contour (All-inside block) ---- */
  .lc-wrap { position: relative; width: 440px; height: 480px; display: flex; align-items: center; justify-content: center; }
  .lc-aura { position: absolute; width: 380px; height: 446px; border-radius: 30px; background: radial-gradient(circle at 50% 45%, rgba(125,147,255,0.5), rgba(125,147,255,0) 70%); filter: blur(34px); animation: lcAura 6s ease-in-out infinite; }

  .lc-spark { position: absolute; top: -1.5px; left: 12%; width: 38%; height: 3px; border-radius: 3px; background: linear-gradient(90deg, rgba(255,255,255,0), rgba(174,191,255,0.95), rgba(255,255,255,0)); filter: blur(0.4px); animation: lcSpark 4.6s linear infinite; }
  .lc-doc { position: relative; width: 296px; height: 366px; background: #fff; border-radius: 6px; box-shadow: 0 14px 40px rgba(0,0,0,0.28); overflow: hidden; }
  .lc-datewrap { position: relative; display: inline-block; }
  .lc-sig { transform: translateY(-46px) scale(1.05); opacity: 0; animation: lcSig 7s ease-in-out infinite; }
  .lc-date { display: inline-block; font-family: 'Alex Brush', cursive; font-size: 23px; line-height: 1; color: #12224a; white-space: nowrap; clip-path: inset(0 100% 0 0); animation: lcWrite 7s ease-in-out infinite; }
  .lc-pen { position: absolute; left: 0; bottom: 4px; transform: translateX(0); opacity: 0; animation: lcPen 7s ease-in-out infinite; }
  .lc-chip { opacity: 0; transform: translateY(-5px); animation: lcChip 7s ease-in-out infinite; }
  @keyframes lcSig {
    0%, 7% { opacity: 0; transform: translateY(-46px) scale(1.05); }
    19% { opacity: 1; transform: translateY(0) scale(1); }
    92% { opacity: 1; transform: translateY(0) scale(1); }
    97%, 100% { opacity: 0; transform: translateY(-46px) scale(1.05); }
  }
  @keyframes lcWrite {
    0%, 30% { clip-path: inset(0 100% 0 0); opacity: 1; }
    52%, 90% { clip-path: inset(0 -4% 0 0); opacity: 1; }
    95% { clip-path: inset(0 -4% 0 0); opacity: 0; }
    96%, 100% { clip-path: inset(0 100% 0 0); opacity: 0; }
  }
  @keyframes lcPen {
    0%, 30% { opacity: 0; transform: translateX(0); }
    34% { opacity: 1; }
    50% { opacity: 1; transform: translateX(72px); }
    54%, 100% { opacity: 0; transform: translateX(78px); }
  }
  @keyframes lcChip {
    0%, 56% { opacity: 0; transform: translateY(-5px); }
    62% { opacity: 1; transform: translateY(0); }
    92% { opacity: 1; transform: translateY(0); }
    97%, 100% { opacity: 0; transform: translateY(-5px); }
  }
  @keyframes lcAura { 0%,100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 0.82; transform: scale(1.05); } }
  @keyframes lcFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes lcSpark { 0% { left: -38%; opacity: 0; } 18% { opacity: 1; } 82% { opacity: 1; } 100% { left: 100%; opacity: 0; } }
  @media (prefers-reduced-motion: reduce) {

  @keyframes pktGo {

<script type="text/babel">
function detectLang() {
  try {
    const saved = localStorage.getItem("sd-lang");
    if (saved === "ru" || saved === "en") return saved;
    const nav = (navigator.language || navigator.userLanguage || "en").toLowerCase();
    return nav.startsWith("ru") ? "ru" : "en";
  } catch (e) { return "en"; }
}

function App() {
  const [lang, setLangState] = React.useState(detectLang());
  const t = window.SD[lang];
  const setLang = (l) => {
    setLangState(l);
    try { localStorage.setItem("sd-lang", l); } catch (e) {}
    document.documentElement.lang = l;
  };
  React.useEffect(() => { document.documentElement.lang = lang; }, [lang]);

  return (
    <div>
      <Header t={t} lang={lang} setLang={setLang} />
      <Hero t={t} lang={lang} setLang={setLang} />
      <HowItWorks t={t} />
      <Features t={t} />
      <Privacy t={t} />
      <Comparison t={t} />
      <Demo t={t} lang={lang} />
      <Download t={t} />
      <Support t={t} />
      <Footer t={t} />
      <CookieBanner t={t} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
